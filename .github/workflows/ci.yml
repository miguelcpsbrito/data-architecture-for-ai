name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install linters
        run: pip install ruff mypy
      - name: Ruff (style + syntax)
        run: ruff check python/ reference/
      - name: Mypy (type check)
        run: mypy python/ reference/ --ignore-missing-imports --no-strict-optional

  lint-sql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install sqlfluff
        run: pip install sqlfluff
      - name: SQLFluff lint
        run: sqlfluff lint sql/ --dialect postgres
